<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VATRENAH – قريباً</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Tajawal:wght@300;400;700&family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:  #1a7a7a;
      --teal2: #0d5c6e;
      --gold:  #c8871a;
      --gold2: #e8a832;
      --navy:  #1a2340;
      --light: #f4f6f9;
      --white: #ffffff;
    }
    html, body { height: 100%; font-family: "Tajawal", sans-serif; background: #e8f0f8; color: var(--navy); overflow-x: hidden; }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(26,122,122,.13) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 90% 80%, rgba(200,135,26,.07) 0%, transparent 55%),
        linear-gradient(160deg, #dce8f5 0%, #eaf2fb 40%, #f0f6fc 70%, #e8f0f8 100%);
    }
    .star { position: fixed; color: #b0baca; font-size: 1.5rem; z-index: 1; opacity: .6; animation: twinkle 3s ease-in-out infinite; }
    .star-tl { top: 3%; left: 3%; } .star-tr { top: 3%; right: 3%; animation-delay: .8s; }
    .star-bl { bottom: 3%; left: 3%; animation-delay: 1.5s; } .star-br { bottom: 3%; right: 3%; animation-delay: 2.2s; }
    @keyframes twinkle { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:.8;transform:scale(1.25)} }
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .particle { position: absolute; border-radius: 50%; opacity: 0; animation: float-up linear infinite; }
    @keyframes float-up {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: .5; }
      90%  { opacity: .2; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
    .page {
      position: relative; z-index: 2;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem; text-align: center;
    }
    .logo-wrap {
      background: rgba(255,255,255,.75); backdrop-filter: blur(18px);
      border: 1px solid rgba(200,135,26,.20); border-radius: 2rem;
      padding: 2.5rem 3.5rem;
      box-shadow: 0 20px 60px rgba(26,35,64,.08), 0 4px 16px rgba(200,135,26,.08);
      animation: rise .9s cubic-bezier(.22,1,.36,1) both; margin-bottom: 2.5rem;
    }
    .logo-wrap img { width: clamp(280px, 55vw, 500px); display: block; }
    @keyframes rise { from { opacity:0; transform: translateY(40px); } to { opacity:1; transform: none; } }
    .badge {
      display: inline-flex; align-items: center; gap: .6rem;
      background: linear-gradient(120deg, var(--teal2), var(--teal));
      color: #fff; font-family: "Montserrat", sans-serif;
      font-size: .7rem; font-weight: 800; letter-spacing: .22em; text-transform: uppercase;
      padding: .45rem 1.4rem; border-radius: 999px;
      box-shadow: 0 4px 18px rgba(13,92,110,.28);
      animation: rise .9s .15s cubic-bezier(.22,1,.36,1) both; margin-bottom: 2rem;
    }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold2); animation: pulse-dot 1.6s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.6} }
    .ornament {
      display: flex; align-items: center; gap: 1rem;
      animation: rise .9s .4s cubic-bezier(.22,1,.36,1) both;
      margin-bottom: 2.8rem; width: clamp(200px, 60vw, 480px);
    }
    .ornament-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(200,135,26,.45), transparent); }
    .ornament-icon { font-size: 1.2rem; color: var(--gold); }
    .countdown {
      display: flex; gap: 1.4rem; flex-wrap: wrap; justify-content: center;
      animation: rise .9s .5s cubic-bezier(.22,1,.36,1) both; margin-bottom: 3rem;
    }
    .cd-box {
      background: rgba(255,255,255,.85); backdrop-filter: blur(10px);
      border: 1px solid rgba(26,122,122,.15); border-radius: 1.2rem;
      padding: 1.2rem 1.6rem; min-width: 90px;
      box-shadow: 0 8px 28px rgba(26,35,64,.07); position: relative; overflow: hidden;
    }
    .cd-box::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--teal), var(--gold)); }
    .cd-num {
      font-family: "Montserrat", sans-serif; font-size: clamp(2rem, 6vw, 3rem); font-weight: 800;
      background: linear-gradient(135deg, var(--teal2), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;
    }
    .cd-label { font-family: "Tajawal", sans-serif; font-size: .72rem; color: #7a8a9a; letter-spacing: .1em; text-transform: uppercase; margin-top: .35rem; }
    .socials { display: flex; gap: 1rem; animation: rise .9s .7s cubic-bezier(.22,1,.36,1) both; margin-bottom: 2rem; }
    .social-link {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,.8); border: 1px solid rgba(26,122,122,.18);
      display: flex; align-items: center; justify-content: center;
      color: var(--teal2); text-decoration: none; font-size: 1rem;
      box-shadow: 0 4px 14px rgba(13,92,110,.08);
      transition: transform .2s, box-shadow .2s, background .2s;
    }
    .social-link:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(13,92,110,.15); background: var(--white); }
    footer { font-size: .75rem; color: #9aabbb; letter-spacing: .04em; animation: rise .9s .8s cubic-bezier(.22,1,.36,1) both; }
    .shimmer-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 99;
      background: linear-gradient(90deg, var(--teal2), var(--gold), var(--teal2));
      background-size: 200% 100%; animation: shimmer 2.5s linear infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    @media (max-width: 480px) {
      .logo-wrap { padding: 1.6rem 1.4rem; border-radius: 1.4rem; }
      .cd-box { min-width: 70px; padding: .9rem 1rem; }
      .countdown { gap: .8rem; }
    }
  </style>
</head>

  <script>
    const LAUNCH = new Date("2026-10-10T00:00:00");
    function pad(n){ return String(n).padStart(2,"0"); }
    function updateCountdown(){
      const now = new Date();
      let diff = Math.max(0, LAUNCH - now);
      const d = Math.floor(diff / 86400000); diff -= d * 86400000;
      const h = Math.floor(diff / 3600000);  diff -= h * 3600000;
      const m = Math.floor(diff / 60000);    diff -= m * 60000;
      const s = Math.floor(diff / 1000);
      document.getElementById("cd-days").textContent  = pad(d);
      document.getElementById("cd-hours").textContent = pad(h);
      document.getElementById("cd-mins").textContent  = pad(m);
      document.getElementById("cd-secs").textContent  = pad(s);
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
    const container = document.getElementById("particles");
    const TEAL = ["rgba(26,122,122,", "rgba(13,92,110,"];
    const GOLD  = ["rgba(200,135,26,", "rgba(232,168,50,"];
    function spawnParticle(){
      const el = document.createElement("div");
      const size = 4 + Math.random() * 8;
      const isGold = Math.random() > .5;
      const col = (isGold ? GOLD : TEAL)[Math.floor(Math.random()*2)];
      const dur = 8 + Math.random() * 12;
      const delay = Math.random() * dur;
      el.className = "particle";
      Object.assign(el.style, {
        width: size + "px", height: size + "px",
        left: Math.random() * 100 + "vw",
        background: col + (0.3 + Math.random()*.4) + ")",
        animationDuration: dur + "s",
        animationDelay: "-" + delay + "s",
      });
      container.appendChild(el);
      setTimeout(() => el.remove(), (dur + delay) * 1000);
    }
    for(let i = 0; i < 18; i++) setTimeout(spawnParticle, i * 300);
    setInterval(spawnParticle, 1200);
  </script>
